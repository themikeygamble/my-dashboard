name: Daily Swing Scan

on:
  schedule:
    - cron: '30 21 * * 1-5'  # 4:30 PM ET, Mon–Fri
  workflow_dispatch:           # manual trigger from GitHub Actions tab

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy

      - name: Run scanner
        run: python scripts/scanner.py

      - name: Commit and push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/screener_data.json
          git diff --cached --quiet || git commit -m "Swing scan $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
